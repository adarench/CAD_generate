services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: utah-subdivision-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: subdivision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./apps/python-api/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subdivision"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgis-data:
